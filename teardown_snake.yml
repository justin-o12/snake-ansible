---
- name: Teardown Snake Game
  hosts: localhost
  gather_facts: false
  vars:
    app_name: snake
    namespace: "{{ target_namespace | default('justin-oursler-dev') }}"

  tasks:
    - name: Delete Deployment
      kubernetes.core.k8s:
        state: absent
        api_version: apps/v1
        kind: Deployment
        name: "{{ app_name }}"
        namespace: "{{ namespace }}"

    - name: Delete Service
      kubernetes.core.k8s:
        state: absent
        api_version: v1
        kind: Service
        name: "{{ app_name }}"
        namespace: "{{ namespace }}"

    - name: Delete Route
      kubernetes.core.k8s:
        state: absent
        api_version: route.openshift.io/v1
        kind: Route
        name: "{{ app_name }}"
        namespace: "{{ namespace }}"

    - name: Confirm teardown
      ansible.builtin.debug:
        msg: "🗑️ Snake resources deleted from '{{ namespace }}'."
